services:
  - type: web
    name: eduprimaire-backend
    runtime: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "python manage.py migrate && gunicorn eduprimaire.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DATABASE_URL
        value: "sqlite:////data/db.sqlite3"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://eduprimaire.netlify.app,https://eduprimaire-frontend.onrender.com,http://localhost:5173,http://127.0.0.1:5173"
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1

  - type: static
    name: eduprimaire-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    publishDir: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: "https://eduprimaire-backend.onrender.com/api"

