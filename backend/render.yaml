services:
  - type: web
    name: eduprimaire-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn eduprimaire.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        value: "sqlite:////data/db.sqlite3"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://eduprimaire.netlify.app"
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
